<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>신임 경찰 도둑 잡기</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html,body { width:100%; height:100%; overflow:hidden; background:#0a0f1e; }
.screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; }
.screen.active { display:flex; }
#screen-intro { background:linear-gradient(160deg,#0a0f1e 60%,#1a1040); gap:12px; padding:20px; text-align:center; font-family:sans-serif; }
.logo { font-size:56px; animation:bounce 1s infinite alternate; }
@keyframes bounce{to{transform:translateY(-8px)}}
.title { font-size:clamp(20px,5vw,30px); font-weight:900; color:#fff; }
.title span { background:linear-gradient(90deg,#60a5fa,#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.intro-cards { display:grid; grid-template-columns:1fr 1fr; gap:8px; width:90%; max-width:360px; }
.card { background:#1e293b; border:1px solid #334155; border-radius:10px; padding:10px 12px; font-size:12px; color:#94a3b8; text-align:left; }
.card b { color:#f472b6; display:block; font-size:13px; margin-bottom:2px; }
.btn { background:linear-gradient(135deg,#2563eb,#7c3aed); border:none; border-radius:12px; color:#fff; font-size:17px; font-weight:900; font-family:inherit; padding:15px 44px; cursor:pointer; box-shadow:0 0 24px rgba(124,58,237,.5); animation:glow 1.5s infinite alternate; }
@keyframes glow{to{box-shadow:0 0 36px rgba(124,58,237,.9)}}
#screen-game { background:#0a0f1e; width:100%; height:100%; overflow:hidden; }
#hud { width:100%; max-width:520px; display:flex; justify-content:space-between; align-items:center; padding:7px 14px; background:#0d1425ee; border-bottom:2px solid #1e3a5f; flex-shrink:0; font-family:sans-serif; }
.hi { text-align:center; }
.hl { font-size:9px; color:#475569; text-transform:uppercase; letter-spacing:1px; }
.hv { font-size:17px; font-weight:900; color:#60a5fa; }
.hv.warn { color:#f87171; animation:blink .4s infinite; }
.hv.combo { color:#f472b6; }
@keyframes blink{50%{opacity:.2}}
#levelbar-wrap { position:absolute; top:44px; left:0; right:0; height:3px; background:#1e293b; max-width:520px; margin:0 auto; z-index:10; }
#levelbar { height:100%; background:linear-gradient(90deg,#3b82f6,#a855f7); transition:width .3s; }
#toast { position:fixed; top:56px; left:50%; transform:translateX(-50%); padding:5px 18px; border-radius:20px; font-size:13px; font-weight:700; pointer-events:none; opacity:0; transition:opacity .15s; z-index:200; font-family:sans-serif; white-space:nowrap; }
#toast.show { opacity:1; }
#gameCanvas { display:block; flex:1; width:100%; }

<body>

<script>
const $=id=>document.getElementById(id);
function showScreen(n){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $('screen-'+n).classList.add('active'); }

const canvas=$('gameCanvas'), ctx=canvas.getContext('2d');
// 아이폰 호환: 실제 렌더된 크기 기준
let W, H;
function resizeCanvas(){
  const hud=$('hud');
  const hudH = hud.offsetHeight || 50;
  W = Math.min(520, window.innerWidth);
  H = Math.max(280, window.innerHeight - hudH - 4);
  H = Math.min(H, 560);
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W+'px';
  canvas.style.height = H+'px';

}
// 초기화는 startGame에서 호출

let bestScore=0;

// ═══════════════════════════════
//  DRAW 함수들
// ═══════════════════════════════

function drawRoad(){
  ctx.fillStyle='#111827'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(71,85,105,0.18)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.setLineDash([12,12]); ctx.strokeStyle='rgba(234,179,8,0.08)'; ctx.lineWidth=2;
  for(let x=30;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=30;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.setLineDash([]);
}

function drawObstacle(o){
  // 그림자
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.roundRect(o.x+3,o.y+3,o.w,o.h,4); ctx.fill();
  // 본체
  ctx.fillStyle='#374151';
  ctx.strokeStyle='#f97316'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.roundRect(o.x,o.y,o.w,o.h,4); ctx.fill(); ctx.stroke();
  // 아이콘
  ctx.font=`${Math.min(o.w,o.h)*0.55}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🚧',o.x+o.w/2,o.y+o.h/2);
}

function drawCar(cx,cy,angle,boosting){
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
  if(boosting){ ctx.shadowColor='#60a5fa'; ctx.shadowBlur=20; }
  // 차체
  ctx.fillStyle='#1d4ed8';
  ctx.beginPath(); ctx.roundRect(-13,-22,26,44,6); ctx.fill();
  // 흰줄
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fillRect(-13,-4,26,8);
  // 앞유리
  ctx.fillStyle='#93c5fd'; ctx.beginPath(); ctx.roundRect(-11,-20,22,11,3); ctx.fill();
  // 뒷유리
  ctx.fillStyle='rgba(147,197,253,0.5)'; ctx.beginPath(); ctx.roundRect(-11,11,22,8,3); ctx.fill();
  // 바퀴
  ctx.fillStyle='#0f172a';
  [[-16,-18],[-16,10],[11,-18],[11,10]].forEach(([wx,wy])=>ctx.fillRect(wx,wy,5,9));
  ctx.fillStyle='#475569';
  [[-15,-16],[-15,12],[12,-16],[12,12]].forEach(([wx,wy])=>ctx.fillRect(wx,wy,3,5));
  // 사이렌 깜빡
  const bl=Math.floor(Date.now()/160)%2===0;
  ctx.shadowBlur=12;
  ctx.fillStyle=bl?'#ef4444':'rgba(239,68,68,0.08)'; ctx.shadowColor='#ef4444';
  ctx.beginPath(); ctx.roundRect(-11,-21,7,4,2); ctx.fill();
  ctx.fillStyle=bl?'rgba(59,130,246,0.08)':'#3b82f6'; ctx.shadowColor='#3b82f6';
  ctx.beginPath(); ctx.roundRect(4,-21,7,4,2); ctx.fill();
  ctx.shadowBlur=0;
  // 헤드라이트
  ctx.fillStyle='#fef08a';
  ctx.beginPath(); ctx.roundRect(-12,-22,5,3,1); ctx.fill();
  ctx.beginPath(); ctx.roundRect(7,-22,5,3,1); ctx.fill();
  // 배지
  ctx.fillStyle='#fbbf24'; ctx.font='bold 9px serif';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('★',0,0);
  ctx.restore();
}

function drawThief(cx,cy,wob,isGold){
  ctx.save(); ctx.translate(cx,cy);
  const w=Math.sin(wob)*1.8;
  if(isGold){ctx.shadowColor='#fbbf24'; ctx.shadowBlur=14;}
  ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.ellipse(w,15,9,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=isGold?'#78350f':'#1e293b';
  ctx.fillRect(-5+w,7,4,9); ctx.fillRect(1+w,7,4,9);
  ctx.fillStyle='#0f172a';
  ctx.beginPath(); ctx.ellipse(-3+w,17,4,2.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4+w,17,4,2.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=isGold?'#d97706':'#1e293b';
  ctx.beginPath(); ctx.roundRect(-8+w,-2,16,11,4); ctx.fill();
  ctx.strokeStyle=isGold?'#d97706':'#1e293b'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(7+w,2); ctx.lineTo(13+w,5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-7+w,2); ctx.lineTo(-11+w,5); ctx.stroke();
  ctx.fillStyle=isGold?'#fbbf24':'#92400e';
  ctx.beginPath(); ctx.arc(13+w,5,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=isGold?'#7c3aed':'#fbbf24';
  ctx.font='bold 7px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(isGold?'★':'$',13+w,5);
  ctx.fillStyle=isGold?'#fcd34d':'#fbbf24';
  ctx.beginPath(); ctx.arc(w,-10,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=isGold?'#78350f':'#1e293b';
  ctx.beginPath(); ctx.ellipse(w,-17,9,4.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillRect(-9+w,-17,18,7);
  ctx.fillStyle=isGold?'#92400e':'#374151';
  ctx.beginPath(); ctx.ellipse(w,-11,9,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=isGold?'#b45309':'#374151';
  ctx.beginPath(); ctx.roundRect(-8+w,-8,16,7,3); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(-3.5+w,-12,2.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3.5+w,-12,2.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0f172a';
  ctx.beginPath(); ctx.arc(-2.5+w,-12,1.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4.5+w,-12,1.8,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawArrested(cx,cy,life){
  ctx.save(); ctx.translate(cx,cy); ctx.globalAlpha=life;
  ctx.fillStyle='#fbbf24'; ctx.beginPath(); ctx.arc(0,-10,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1e293b'; ctx.fillRect(-9,-17,18,7);
  ctx.fillStyle='#374151'; ctx.beginPath(); ctx.ellipse(0,-11,9,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#374151'; ctx.beginPath(); ctx.roundRect(-8,-8,16,7,3); ctx.fill();
  ctx.fillStyle='#ef4444'; ctx.font='bold 9px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('✕',-3,-12); ctx.fillText('✕',4,-12);
  ctx.strokeStyle='#94a3b8'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(-5,3,4,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(5,3,4,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-1,3); ctx.lineTo(1,3); ctx.stroke();
  ctx.font='12px serif';
  ctx.fillText('⭐',-13,-22); ctx.fillText('⭐',10,-24);
  ctx.globalAlpha=1; ctx.restore();
}

// ═══════════════════════════════
//  충돌 함수 (push-out 방식)
// ═══════════════════════════════

// 원이 사각형 안에 겹치면 밀어내는 벡터 반환
function resolveCircleRect(cx,cy,cr,rx,ry,rw,rh){
  // 사각형에서 가장 가까운 점
  const nearX=Math.max(rx, Math.min(cx, rx+rw));
  const nearY=Math.max(ry, Math.min(cy, ry+rh));
  const dx=cx-nearX, dy=cy-nearY;
  const dist=Math.hypot(dx,dy);
  if(dist===0){
    // 중심이 완전히 내부 → 가장 가까운 면 쪽으로 밀기
    const overlapL=cx-rx, overlapR=(rx+rw)-cx;
    const overlapT=cy-ry, overlapB=(ry+rh)-cy;
    const minOv=Math.min(overlapL,overlapR,overlapT,overlapB);
    if(minOv===overlapL) return {px:-(cr+overlapL),py:0};
    if(minOv===overlapR) return {px:cr+overlapR,py:0};
    if(minOv===overlapT) return {px:0,py:-(cr+overlapT)};
    return {px:0,py:cr+overlapB};
  }
  if(dist>=cr) return null; // 겹치지 않음
  const pen=cr-dist;
  return {px:dx/dist*pen, py:dy/dist*pen};
}

// 오브젝트(x,y,r)를 모든 장애물에서 밀어냄
function pushOutAll(obj){
  state.obstacles.forEach(o=>{
    const res=resolveCircleRect(obj.x,obj.y,obj.r,o.x,o.y,o.w,o.h);
    if(res){ obj.x+=res.px; obj.y+=res.py; }
  });
}

// ═══════════════════════════════
//  사운드
// ═══════════════════════════════
let _ac = null;
let _bgLoop = null;
let _bgPlaying = false;

function initAudio(){
  if(_ac) return;
  _ac = new (window.AudioContext || window.webkitAudioContext)();
}

function _beep(freqs, dur, type, vol){
  if(!_ac) return;
  freqs.forEach((f, i) => {
    setTimeout(() => {
      const o = _ac.createOscillator();
      const g = _ac.createGain();
      o.connect(g); g.connect(_ac.destination);
      o.type = type || 'square';
      o.frequency.value = f;
      g.gain.setValueAtTime(vol||0.3, _ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, _ac.currentTime + dur);
      o.start(_ac.currentTime);
      o.stop(_ac.currentTime + dur + 0.01);
    }, i * 100);
  });
}

// ── 배경음악 (8비트 루프) ──
const _BG_NOTES = [
  [330,0.12],[330,0.12],[0,0.06],[330,0.12],[0,0.06],[262,0.12],[330,0.12],
  [0,0.12],[392,0.18],[0,0.18],[196,0.18],[0,0.18],
  [262,0.12],[0,0.12],[196,0.12],[0,0.12],[165,0.12],[0,0.12],
  [220,0.12],[233,0.12],[220,0.12],[0,0.06],[196,0.15],[330,0.15],[392,0.15],[440,0.15],
];
let _bgIdx = 0;
let _bgTO = null;

function _bgTick(){
  if(!_bgPlaying || !_ac) return;
  const [freq, dur] = _BG_NOTES[_bgIdx % _BG_NOTES.length];
  if(freq > 0){
    const o = _ac.createOscillator();
    const g = _ac.createGain();
    o.connect(g); g.connect(_ac.destination);
    o.type = 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.08, _ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, _ac.currentTime + dur * 0.9);
    o.start(_ac.currentTime);
    o.stop(_ac.currentTime + dur);
  }
  _bgIdx++;
  _bgTO = setTimeout(_bgTick, dur * 1000);
}

function startBGM(){
  if(_bgPlaying) return;
  _bgPlaying = true;
  _bgIdx = 0;
  _bgTick();
}

function stopBGM(){
  _bgPlaying = false;
  if(_bgTO) clearTimeout(_bgTO);
}

// ── 오~예! 효과음 (상승 팡파레) ──
function playOhYeah(){
  if(!_ac) return;
  // "오~" 길게 올라가는 소리
  const o1 = _ac.createOscillator();
  const g1 = _ac.createGain();
  o1.connect(g1); g1.connect(_ac.destination);
  o1.type = 'sine';
  o1.frequency.setValueAtTime(300, _ac.currentTime);
  o1.frequency.exponentialRampToValueAtTime(700, _ac.currentTime + 0.3);
  g1.gain.setValueAtTime(0.4, _ac.currentTime);
  g1.gain.exponentialRampToValueAtTime(0.0001, _ac.currentTime + 0.35);
  o1.start(_ac.currentTime);
  o1.stop(_ac.currentTime + 0.36);

  // "예!" 짧고 높게
  setTimeout(()=>{
    if(!_ac) return;
    const o2 = _ac.createOscillator();
    const g2 = _ac.createGain();
    o2.connect(g2); g2.connect(_ac.destination);
    o2.type = 'sine';
    o2.frequency.setValueAtTime(900, _ac.currentTime);
    o2.frequency.exponentialRampToValueAtTime(1400, _ac.currentTime + 0.18);
    g2.gain.setValueAtTime(0.5, _ac.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.0001, _ac.currentTime + 0.22);
    o2.start(_ac.currentTime);
    o2.stop(_ac.currentTime + 0.23);
  }, 320);

  // 뒤에 짧은 팡파레
  [523,659,784,1047].forEach((f,i)=>{
    setTimeout(()=>{
      if(!_ac) return;
      const o = _ac.createOscillator();
      const g = _ac.createGain();
      o.connect(g); g.connect(_ac.destination);
      o.type = 'triangle';
      o.frequency.value = f;
      g.gain.setValueAtTime(0.3, _ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, _ac.currentTime + 0.12);
      o.start(_ac.currentTime);
      o.stop(_ac.currentTime + 0.13);
    }, 550 + i*80);
  });
}

function playArrest()    { _beep([600, 900], 0.12, 'square', 0.3); }
function playGoldArrest(){ _beep([523,659,784,1047], 0.1, 'triangle', 0.35); setTimeout(playOhYeah, 300); }
function playCombo(c)    { _beep([400 + c*60], 0.12, 'sawtooth', 0.25); }
function playSiren()     { _beep([440,550,440], 0.15, 'sawtooth', 0.2); }
function playTimeWarn()  { _beep([880,880], 0.07, 'square', 0.3); }
function playGameOver()  { stopBGM(); _beep([392,330,262,196], 0.18, 'sawtooth', 0.25); }
function playTone(){}



// ═══════════════════════════════
//  이펙트 / 토스트
// ═══════════════════════════════
function burst(x,y,color,n=16){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*6;
    state.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.025+Math.random()*0.04,r:2+Math.random()*5,color});
  }
}
function floatText(x,y,txt,color='#4ade80'){
  state.effects.push({x,y,txt,color,life:1,vy:-2.0});
}
const toastEl=$('toast'); let toastTO;
function toast(msg,bg='#166534cc',bc='#16a34a',tc='#4ade80'){
  toastEl.textContent=msg;
  toastEl.style.background=bg; toastEl.style.border=`1px solid ${bc}`; toastEl.style.color=tc;
  toastEl.classList.add('show');
  clearTimeout(toastTO); toastTO=setTimeout(()=>toastEl.classList.remove('show'),1000);
}

// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let state;
function initState(){
  state={
    score:0, level:1, timeLeft:60,
    combo:1, maxCombo:1, lastArrest:0,
    player:{x:W/2, y:H/2, r:18, speed:3.4, angle:-Math.PI/2, boost:0},
    thieves:[], obstacles:[], particles:[], effects:[], arrested_anim:[],
    keys:{}, running:false, intervalId:null, rafId:null, nextGold:5,
  };
  // 장애물: 중앙 피해서 배치
  const spots=[];
  let tries=0;
  while(spots.length<6 && tries<200){
    tries++;
    const ow=40+Math.random()*20, oh=26+Math.random()*16;
    const ox=50+Math.random()*(W-100-ow);
    const oy=50+Math.random()*(H-100-oh);
    const cx=ox+ow/2, cy=oy+oh/2;
    // 시작 지점(중앙)에서 멀어야 함
    if(Math.hypot(cx-W/2,cy-H/2)<130) continue;
    // 다른 장애물과 안 겹치게
    const overlap=spots.some(s=>Math.abs(cx-s.cx)<70&&Math.abs(cy-s.cy)<60);
    if(overlap) continue;
    spots.push({cx,cy});
    state.obstacles.push({x:ox,y:oy,w:ow,h:oh});
  }
}

function spawnThief(gold=false){
  const edge=Math.floor(Math.random()*4);
  let x,y;
  if(edge===0){x=30+Math.random()*(W-60);y=30;}
  else if(edge===1){x=W-30;y=30+Math.random()*(H-60);}
  else if(edge===2){x=30+Math.random()*(W-60);y=H-30;}
  else{x=30;y=30+Math.random()*(H-60);}
  const spd=0.9+state.level*0.2+Math.random()*0.35;
  state.thieves.push({x,y,r:15,speed:spd,wobble:Math.random()*Math.PI*2,gold,wanderAngle:Math.random()*Math.PI*2,wanderTimer:0});
}
function getThiefCount(){ return Math.min(2+Math.floor(state.level*1.1),9); }

function updateHUD(){
  $('hv-score').textContent=state.score;
  $('hv-level').textContent=state.level;
  const tv=$('hv-time');
  tv.textContent=state.timeLeft;
  tv.className=state.timeLeft<=10?'hv warn':'hv';
  $('hv-combo').textContent=`x${state.combo}`;
  $('hv-best').textContent=bestScore;
  $('levelbar').style.width=((state.score%8)/8*100)+'%';
}

// ═══════════════════════════════
//  메인 루프
// ═══════════════════════════════
function gameLoop(){
  ctx.clearRect(0,0,W,H);
  drawRoad();
  state.obstacles.forEach(o=>drawObstacle(o));

  const p=state.player;

  // ── 플레이어 이동 ──
  let idx=0, idy=0;
  if(state.keys['ArrowUp']   ||state.keys['w']||state.keys['W']) idy-=1;
  if(state.keys['ArrowDown'] ||state.keys['s']||state.keys['S']) idy+=1;
  if(state.keys['ArrowLeft'] ||state.keys['a']||state.keys['A']) idx-=1;
  if(state.keys['ArrowRight']||state.keys['d']||state.keys['D']) idx+=1;

  if(idx!==0||idy!==0){
    const len=Math.hypot(idx,idy);
    const spd=p.speed+(p.boost>0?2.0:0);
    p.x+=idx/len*spd;
    p.y+=idy/len*spd;
    p.angle=Math.atan2(idy,idx)+Math.PI/2;
  }
  if(p.boost>0) p.boost--;

  // 경계 클램프
  p.x=Math.max(p.r, Math.min(W-p.r, p.x));
  p.y=Math.max(p.r, Math.min(H-p.r, p.y));
  // 장애물 push-out (3회 반복으로 안정적으로)
  pushOutAll(p); pushOutAll(p); pushOutAll(p);
  // push-out 후 경계 재적용
  p.x=Math.max(p.r, Math.min(W-p.r, p.x));
  p.y=Math.max(p.r, Math.min(H-p.r, p.y));

  // ── 도둑 스폰 ──
  while(state.thieves.length<getThiefCount()){
    const spawnGold=state.score>=state.nextGold&&Math.random()<0.3;
    if(spawnGold) state.nextGold+=5;
    spawnThief(spawnGold);
  }

  // ── 도둑 업데이트 ──
  const arrested=[];
  state.thieves.forEach((t,i)=>{
    const ddx=t.x-p.x, ddy=t.y-p.y;
    const dist=Math.hypot(ddx,ddy);

    t.wanderTimer--;
    if(dist<170){
      // 경찰차에서 반대 방향으로 도주
      const spd=t.speed*(dist<90?1.55:1.1);
      t.x+=ddx/dist*spd;
      t.y+=ddy/dist*spd;
    } else {
      // 배회: wanderTimer로 방향 변경 간격 조절
      if(t.wanderTimer<=0){
        t.wanderAngle=Math.random()*Math.PI*2;
        t.wanderTimer=40+Math.random()*60;
      }
      t.x+=Math.cos(t.wanderAngle)*t.speed*0.55;
      t.y+=Math.sin(t.wanderAngle)*t.speed*0.55;
    }

    // 경계
    t.x=Math.max(t.r, Math.min(W-t.r, t.x));
    t.y=Math.max(t.r, Math.min(H-t.r, t.y));
    // 장애물 push-out
    pushOutAll(t); pushOutAll(t);
    t.x=Math.max(t.r, Math.min(W-t.r, t.x));
    t.y=Math.max(t.r, Math.min(H-t.r, t.y));

    t.wobble+=0.1;

    // 체포 판정
    const capDist=Math.hypot(p.x-t.x, p.y-t.y);
    if(capDist<p.r+t.r-2){
      arrested.push(i);
      state.arrested_anim.push({x:t.x,y:t.y,life:1});
      burst(t.x,t.y,t.gold?'#fbbf24':'#f97316',t.gold?22:14);
      burst(t.x,t.y,'#fff',6);
      const now=Date.now();
      state.combo=(now-state.lastArrest<2000)?Math.min(state.combo+1,8):1;
      if(state.combo>state.maxCombo)state.maxCombo=state.combo;
      state.lastArrest=now;
      const pts=(t.gold?3:1)*state.combo;
      state.score+=pts;
      p.boost=25;
      if(t.gold){
        playGoldArrest();
        toast('🌟 황금 도둑! ×3점!','#78350fcc','#d97706','#fbbf24');
        floatText(t.x,t.y-40,`+${pts} 황금!`,'#fbbf24');
      } else if(state.combo>=3){
        playCombo(state.combo);
        toast(`🔥 콤보 x${state.combo}!`,'#7c1d1dcc','#ef4444','#fca5a5');
        floatText(t.x,t.y-40,`콤보 +${pts}`,'#f87171');
      } else {
        playArrest();
        toast('✅ 체포!');
        floatText(t.x,t.y-35,`+${pts}`);
      }
    } else {
      drawThief(t.x,t.y,t.wobble,t.gold);
    }
  });
  for(let i=arrested.length-1;i>=0;i--) state.thieves.splice(arrested[i],1);

  // 체포 애니
  state.arrested_anim.forEach(a=>{a.life-=0.024; drawArrested(a.x,a.y,a.life);});
  state.arrested_anim=state.arrested_anim.filter(a=>a.life>0);

  // 경찰차
  drawCar(p.x,p.y,p.angle,p.boost>0);

  // 파티클
  state.particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.06;pt.life-=pt.decay;});
  state.particles=state.particles.filter(pt=>pt.life>0);
  state.particles.forEach(pt=>{
    ctx.globalAlpha=pt.life;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r*pt.life,0,Math.PI*2);
    ctx.fillStyle=pt.color; ctx.fill();
  });
  ctx.globalAlpha=1;

  // 플로팅 텍스트
  state.effects.forEach(e=>{e.y+=e.vy;e.life-=0.022;});
  state.effects=state.effects.filter(e=>e.life>0);
  state.effects.forEach(e=>{
    ctx.globalAlpha=e.life;
    ctx.font='bold 16px sans-serif'; ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=3;
    ctx.strokeText(e.txt,e.x,e.y);
    ctx.fillStyle=e.color; ctx.fillText(e.txt,e.x,e.y);
  });
  ctx.globalAlpha=1;

  // 레벨/속도 업데이트
  state.level=1+Math.floor(state.score/8);
  p.speed=3.4+state.level*0.07;
  updateHUD();

  if(state.running) state.rafId=requestAnimationFrame(gameLoop);
}

function startTimer(){
  state.intervalId=setInterval(()=>{
    if(!state.running) return;
    state.timeLeft--;
    if(state.timeLeft===10){ toast('⏰ 10초!','#7c1d1dcc','#ef4444','#fca5a5'); playTimeWarn(); }
    if(state.timeLeft>0 && state.timeLeft<=5) playTone(440+(5-state.timeLeft)*40,'square',0.06,0.12);
    if(state.timeLeft<=0) endGame();
  },1000);
}

function endGame(){
  state.running=false;
  cancelAnimationFrame(state.rafId); clearInterval(state.intervalId);
  playGameOver();
  if(state.score>bestScore) bestScore=state.score;
  const sc=state.score;
  let emoji,title,rank;
  if(sc>=50){emoji='🏆';title='전설의 경찰관!';rank='🌟 치안 영웅';}
  else if(sc>=30){emoji='🥇';title='베테랑 경찰!';rank='⭐⭐ 우수 경찰관';}
  else if(sc>=18){emoji='🥈';title='유망주 경찰!';rank='⭐ 성실 경찰관';}
  else if(sc>=8){emoji='🥉';title='수습 완료!';rank='신임 경찰관';}
  else{emoji='📋';title='경험을 쌓아라!';rank='수습 중...';}
  $('go-emoji').textContent=emoji; $('go-title').textContent=title;
  $('go-score').textContent=sc; $('go-level').textContent=state.level;
  $('go-combo').textContent=state.maxCombo; $('go-rank').textContent=rank;
  showScreen('gameover');
  setTimeout(addBtnListeners, 100);
}

function startGame(){
  initAudio();
  stopBGM();
  playSiren();
  setTimeout(startBGM, 600); // 사이렌 끝나고 BGM 시작
  showScreen('game');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    resizeCanvas();
    initState();
    state.running=true; startTimer(); gameLoop();
  }));
}

// ── 키보드 ──
document.addEventListener('keydown',e=>{
  if(state) state.keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{ if(state) state.keys[e.key]=false; });

// ── 터치 ──
let ts=null;
canvas.addEventListener('touchstart',e=>{e.preventDefault(); ts={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!ts||!state||!state.running) return;
  const dx=e.touches[0].clientX-ts.x, dy=e.touches[0].clientY-ts.y;
  if(Math.hypot(dx,dy)>2) state.player.angle=Math.atan2(dy,dx)+Math.PI/2;
  state.player.x=Math.max(state.player.r,Math.min(W-state.player.r,state.player.x+dx*0.55));
  state.player.y=Math.max(state.player.r,Math.min(H-state.player.r,state.player.y+dy*0.55));
  ts={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:false});

// 아이폰: touchstart + click 모두 등록
function addBtnListeners(){
  ['touchstart','click'].forEach(ev=>{
    $('btn-start').addEventListener(ev,e=>{e.preventDefault();startGame();},{once:true,passive:false});
    $('btn-retry').addEventListener(ev,e=>{e.preventDefault();startGame();},{once:true,passive:false});
  });
}
addBtnListeners();
</script>
